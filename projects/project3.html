    <h1>Unbeatable Pong</h1>
  </div>

  <div class="scoreboard">
    <div>You: <span id="player-score">0</span></div>
    <div>AI: <span id="ai-score">0</span></div>
  </div>

  <div class="game-wrap">
    <canvas id="pongCanvas" width="800" height="500"></canvas>
  </div>

  <div class="controls">
    <button onclick="resetGame()">New Game</button>
  </div>
  <p class="hint">Use ↑ ↓ arrow keys to move your paddle</p>

  <div class="mobile-controls">
    <button id="mob-up">▲</button>
    <button id="mob-down">▼</button>
  </div>

  <script>
    const canvas = document.getElementById("pongCanvas");
    const ctx = canvas.getContext("2d");

    const paddleWidth = 12, paddleHeight = 100;
    let leftPaddleY, rightPaddleY;
    const paddleSpeed = 8;
    const ballSize = 12;
    let ballX, ballY, ballSpeedX, ballSpeedY;
    let playerScore = 0, aiScore = 0;
    let upPressed = false, downPressed = false;

    function resetBall() {
      ballX = canvas.width / 2 - ballSize / 2;
      ballY = canvas.height / 2 - ballSize / 2;
      ballSpeedX = (Math.random() > 0.5 ? 1 : -1) * 4;
      ballSpeedY = (Math.random() * 2 - 1) * 4;
    }

    function resetGame() {
      playerScore = 0; aiScore = 0;
      leftPaddleY = canvas.height / 2 - paddleHeight / 2;
      rightPaddleY = canvas.height / 2 - paddleHeight / 2;
      updateScoreboard();
      resetBall();
    }

    function updateScoreboard() {
      document.getElementById("player-score").textContent = playerScore;
      document.getElementById("ai-score").textContent = aiScore;
    }

    function drawPaddle(x, y, color) {
      ctx.fillStyle = color;
      ctx.shadowColor = color;
      ctx.shadowBlur = 12;
      ctx.beginPath();
      ctx.roundRect(x, y, paddleWidth, paddleHeight, 6);
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    function drawBall() {
      ctx.fillStyle = "#a78bfa";
      ctx.shadowColor = "#a78bfa";
      ctx.shadowBlur = 16;
      ctx.beginPath();
      ctx.arc(ballX + ballSize/2, ballY + ballSize/2, ballSize/2, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    function drawCenter() {
      ctx.setLineDash([8, 8]);
      ctx.strokeStyle = "#1e1e2e";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(canvas.width / 2, 0);
      ctx.lineTo(canvas.width / 2, canvas.height);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    document.addEventListener("keydown", e => {
      if (e.key === "ArrowUp") { upPressed = true; e.preventDefault(); }
      if (e.key === "ArrowDown") { downPressed = true; e.preventDefault(); }
    });
    document.addEventListener("keyup", e => {
      if (e.key === "ArrowUp") upPressed = false;
      if (e.key === "ArrowDown") downPressed = false;
    });

    // Mobile
    const mobUp = document.getElementById("mob-up");
    const mobDown = document.getElementById("mob-down");
    mobUp.addEventListener("touchstart", e => { e.preventDefault(); upPressed = true; });
    mobUp.addEventListener("touchend", () => upPressed = false);
    mobDown.addEventListener("touchstart", e => { e.preventDefault(); downPressed = true; });
    mobDown.addEventListener("touchend", () => downPressed = false);

    function gameLoop() {
      ctx.fillStyle = "#0a0a0f";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      drawCenter();

      if (upPressed && leftPaddleY > 0) leftPaddleY -= paddleSpeed;
      if (downPressed && leftPaddleY + paddleHeight < canvas.height) leftPaddleY += paddleSpeed;

      const aiSpeed = 5;
      if (ballY + ballSize / 2 > rightPaddleY + paddleHeight / 2) rightPaddleY += aiSpeed;
      else rightPaddleY -= aiSpeed;

      ballX += ballSpeedX;
      ballY += ballSpeedY;

      if (ballY <= 0 || ballY + ballSize >= canvas.height) ballSpeedY *= -1;

      if (ballX <= paddleWidth + 10 && ballY + ballSize >= leftPaddleY && ballY <= leftPaddleY + paddleHeight) {
        ballSpeedX *= -1;
        ballX = paddleWidth + 10;
      }

      if (ballX + ballSize >= canvas.width - paddleWidth - 10 && ballY + ballSize >= rightPaddleY && ballY <= rightPaddleY + paddleHeight) {
        ballSpeedX *= -1;
        ballX = canvas.width - paddleWidth - 10 - ballSize;
      }

      if (ballX < 0) { aiScore++; updateScoreboard(); resetBall(); }
      if (ballX > canvas.width) { playerScore++; updateScoreboard(); resetBall(); }

      drawPaddle(10, leftPaddleY, "#6366f1");
      drawPaddle(canvas.width - paddleWidth - 10, rightPaddleY, "#7c3aed");
      drawBall();

      requestAnimationFrame(gameLoop);
    }

    resetGame();
    gameLoop();
  </script>
