<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pong Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
    canvas { background: #111; display: block; border: 2px solid #fff; }
  </style>
</head>
<body>
  <canvas id="pongCanvas" width="800" height="500"></canvas>

  <script>
    const canvas = document.getElementById("pongCanvas");
    const ctx = canvas.getContext("2d");

    // Game objects
    const paddleWidth = 10, paddleHeight = 100;
    let leftPaddleY = canvas.height / 2 - paddleHeight / 2;
    let rightPaddleY = canvas.height / 2 - paddleHeight / 2;
    const paddleSpeed = 8;

    const ballSize = 10;
    let ballX = canvas.width / 2 - ballSize / 2;
    let ballY = canvas.height / 2 - ballSize / 2;
    let ballSpeedX = 4, ballSpeedY = 4;

    let upPressed = false, downPressed = false;

    // Draw paddles and ball
    function drawPaddle(x, y) {
      ctx.fillStyle = "white";
      ctx.fillRect(x, y, paddleWidth, paddleHeight);
    }

    function drawBall() {
      ctx.fillStyle = "white";
      ctx.fillRect(ballX, ballY, ballSize, ballSize);
    }

    // Handle input
    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowUp") upPressed = true;
      if (e.key === "ArrowDown") downPressed = true;
    });

    document.addEventListener("keyup", (e) => {
      if (e.key === "ArrowUp") upPressed = false;
      if (e.key === "ArrowDown") downPressed = false;
    });

    // Game loop
    function gameLoop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Move player paddle
      if (upPressed && leftPaddleY > 0) leftPaddleY -= paddleSpeed;
      if (downPressed && leftPaddleY + paddleHeight < canvas.height) leftPaddleY += paddleSpeed;

      // Simple AI for right paddle
      const aiSpeed = 5;
      if (ballY + ballSize / 2 > rightPaddleY + paddleHeight / 2) rightPaddleY += aiSpeed;
      else rightPaddleY -= aiSpeed;

      // Move ball
      ballX += ballSpeedX;
      ballY += ballSpeedY;

      // Collision with top and bottom
      if (ballY <= 0 || ballY + ballSize >= canvas.height) ballSpeedY *= -1;

      // Collision with paddles
      if (
        ballX <= paddleWidth &&
        ballY + ballSize >= leftPaddleY &&
        ballY <= leftPaddleY + paddleHeight
      ) {
        ballSpeedX *= -1;
        ballX = paddleWidth; // Avoid sticking
      }

      if (
        ballX + ballSize >= canvas.width - paddleWidth &&
        ballY + ballSize >= rightPaddleY &&
        ballY <= rightPaddleY + paddleHeight
      ) {
        ballSpeedX *= -1;
        ballX = canvas.width - paddleWidth - ballSize;
      }

      // Reset ball if it goes out
      if (ballX < 0 || ballX > canvas.width) {
        ballX = canvas.width / 2 - ballSize / 2;
        ballY = canvas.height / 2 - ballSize / 2;
        ballSpeedX *= -1;
      }

      // Draw everything
      drawPaddle(0, leftPaddleY); // left paddle
      drawPaddle(canvas.width - paddleWidth, rightPaddleY); // right paddle
      drawBall();

      requestAnimationFrame(gameLoop);
    }

    gameLoop();
  </script>
</body>
</html>
