<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FBI Most Wanted — What The Nash!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
    }
    .header {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.5rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header a {
      color: #7b5ea7;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }
    .header a:hover { color: #a78bfa; }
    .header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #6366f1, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .search-wrap {
      max-width: 600px;
      margin: 0 auto 2rem;
      padding: 0 1rem;
    }
    .search-wrap input {
      width: 100%;
      padding: 0.8rem 1.2rem;
      border-radius: 10px;
      border: 2px solid #1e1e2e;
      background: #12121a;
      color: #e0e0e0;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-wrap input:focus { border-color: #6366f1; }
    .search-wrap input::placeholder { color: #555; }
    .loader {
      text-align: center;
      padding: 3rem;
      display: none;
    }
    .loader.active { display: block; }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #1e1e2e;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.25rem;
    }
    .card {
      background: #12121a;
      border: 1px solid #1e1e2e;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    }
    .card:hover {
      transform: translateY(-4px);
      border-color: #6366f1;
      box-shadow: 0 8px 30px rgba(99, 102, 241, 0.15);
    }
    .card img {
      width: 100%;
      height: 280px;
      object-fit: cover;
      background: #1e1e2e;
    }
    .card-body {
      padding: 1rem;
    }
    .card-body .name {
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: 0.35rem;
      color: #fff;
    }
    .card-body .subjects {
      font-size: 0.82rem;
      color: #7b5ea7;
      line-height: 1.4;
    }
    .no-results {
      text-align: center;
      padding: 3rem;
      color: #555;
      grid-column: 1 / -1;
    }
    .pagination {
      text-align: center;
      padding: 2rem 1rem;
      display: flex;
      justify-content: center;
      gap: 0.75rem;
    }
    .pagination button {
      background: linear-gradient(135deg, #6366f1, #7c3aed);
      color: white;
      border: none;
      padding: 0.6rem 1.4rem;
      border-radius: 8px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.2s;
    }
    .pagination button:hover { transform: translateY(-2px); }
    .pagination button:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      transform: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <a href="../index.html">← Back to Home</a>
    <h1>FBI Most Wanted</h1>
  </div>

  <div class="search-wrap">
    <input type="text" id="search-box" placeholder="Search by name or crime...">
  </div>

  <div class="loader" id="loader"><div class="spinner"></div></div>
  <div class="container" id="wanted-list"></div>

  <div class="pagination">
    <button id="prev-btn" disabled>← Previous</button>
    <button id="next-btn">Next →</button>
  </div>

  <script>
    let currentPage = 1;
    let searchQuery = "";
    let debounceTimer;

    async function fetchWanted() {
      const loader = document.getElementById("loader");
      const container = document.getElementById("wanted-list");
      loader.classList.add("active");
      container.innerHTML = "";

      try {
        const url = `https://api.fbi.gov/wanted/v1/list?page=${currentPage}&title=${encodeURIComponent(searchQuery)}`;
        const res = await fetch(url);
        const data = await res.json();
        loader.classList.remove("active");

        if (!data.items || data.items.length === 0) {
          container.innerHTML = '<div class="no-results">No results found.</div>';
          return;
        }

        data.items.forEach(person => {
          const card = document.createElement("div");
          card.className = "card";
          card.onclick = () => window.open(person.url, "_blank");
          const imgSrc = person.images?.[0]?.large || person.images?.[0]?.thumb || '';
          const subjects = person.subjects ? person.subjects.join(", ") : "";
          card.innerHTML = `
            <img src="${imgSrc}" alt="${person.title}" loading="lazy" onerror="this.style.display='none'">
            <div class="card-body">
              <div class="name">${person.title}</div>
              ${subjects ? `<div class="subjects">${subjects}</div>` : ''}
            </div>
          `;
          container.appendChild(card);
        });

        document.getElementById("prev-btn").disabled = currentPage === 1;
        document.getElementById("next-btn").disabled = data.items.length < 20;
      } catch (error) {
        loader.classList.remove("active");
        container.innerHTML = '<div class="no-results">Error loading data. Try again.</div>';
      }
    }

    document.getElementById("search-box").addEventListener("input", e => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => {
        searchQuery = e.target.value;
        currentPage = 1;
        fetchWanted();
      }, 400);
    });

    document.getElementById("prev-btn").addEventListener("click", () => {
      if (currentPage > 1) { currentPage--; fetchWanted(); }
    });
    document.getElementById("next-btn").addEventListener("click", () => {
      currentPage++; fetchWanted();
    });

    fetchWanted();
  </script>
</body>
</html>
