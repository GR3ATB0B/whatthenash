<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FBI Wanted List</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 20px;
    }
    h1 {
      text-align: center;
    }
    .container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
    .card img {
      width: 100%;
      border-radius: 8px;
    }
    .name {
      font-weight: bold;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h1>FBI Wanted List</h1>
  <div class="container" id="wanted-list"></div>

  <script>
    async function fetchWanted() {
      const res = await fetch("https://www.fbi.gov/wanted/api/v1/wanted");
      const data = await res.json();
      const container = document.getElementById("wanted-list");
      
      data.items.forEach(person => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <img src="${person.images?.[0]?.original || ''}" alt="${person.title}">
          <div class="name">${person.title}</div>
          <div>${person.subjects ? person.subjects.join(", ") : ""}</div>
        `;
        container.appendChild(card);
      });
    }

    fetchWanted();
  </script>
</body>
</html>
