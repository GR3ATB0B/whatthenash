<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project 2</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <header>
    <h1>Project 2</h1>
    <a href="../index.html">← Back to Home</a>
  </header>
  <main>
    <p>A second playground page. Try adding interactive elements here!</p>
    <div id="box" style="width:100px;height:100px;background:red;margin:auto;"></div>
    <button onclick="document.getElementById('box').style.background = getRandomColor()">Change Color</button>
  </main>

  <script>
    function getRandomColor() {
      return '#' + Math.floor(Math.random() * 16777215).toString(16);
    }
  </script>
</body>
</html>
