<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hperplex Visual Collection v1.1</title>
  <style>
    html, body { margin:0; padding:0; overflow:hidden; background:#000; }
    canvas { display:block; }
    #controls {
      position: absolute;
      top: 10px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.5); padding: 10px 20px;
      border-radius: 10px; display: flex; gap: 10px;
      z-index: 10; font-family: monospace;
    }
    button {
      background: #111; color: #0f0; border: 1px solid #0f0;
      padding: 5px 10px; cursor: pointer; border-radius: 5px;
    }
    button:hover { background: #0f0; color: #000; }
  </style>
</head>
<body>
<div id="controls">
  <button id="prev">Previous</button>
  <button id="next">Next</button>
</div>
<canvas id="canvas"></canvas>
<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
let W = canvas.width = window.innerWidth;
let H = canvas.height = window.innerHeight;
window.addEventListener("resize", () => {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
});

const mouse = { x: W/2, y: H/2 };
window.addEventListener("mousemove", e => { mouse.x = e.clientX; mouse.y = e.clientY; });

let mode = 0;
const totalModes = 11;
document.getElementById("next").onclick = () => switchMode((mode + 1) % totalModes);
document.getElementById("prev").onclick = () => switchMode((mode - 1 + totalModes) % totalModes);

function switchMode(newMode) {
  mode = newMode;
  initEffect();
}

// === Particle setup ===
let particles = [];
function initEffect() {
  particles = [];
  if (mode === 10) { // Interactive Particle Playground
    for (let i = 0; i < 300; i++) {
      particles.push({
        x: Math.random() * W,
        y: Math.random() * H,
        vx: (Math.random() - 0.5) * 2,
        vy: (Math.random() - 0.5) * 2,
        size: Math.random() * 2 + 1,
        hue: Math.random() * 360
      });
    }
  } else {
    for (let i = 0; i < 500; i++) {
      particles.push({
        x: Math.random() * W,
        y: Math.random() * H,
        vx: (Math.random() - 0.5) * 2,
        vy: (Math.random() - 0.5) * 2,
        hue: Math.random() * 360,
        size: Math.random() * 2 + 1,
        z: Math.random() * W // for starfield
      });
    }
  }
}
initEffect();

window.addEventListener("click", e => {
  if (mode === 10) {
    for (let i = 0; i < 50; i++) {
      particles.push({
        x: mouse.x,
        y: mouse.y,
        vx: (Math.random() - 0.5) * 10,
        vy: (Math.random() - 0.5) * 10,
        size: Math.random() * 2 + 1,
        hue: Math.random() * 360
      });
    }
  }
});

// === Draw loop ===
function draw() {
  ctx.fillStyle = "rgba(0,0,0,0.1)";
  ctx.fillRect(0, 0, W, H);

  switch(mode) {
    case 0: /* ... same modes 0–9 as before ... */ break;

    case 10: // Interactive Particle Playground
      particles.forEach(p => {
        const dx = p.x - mouse.x;
        const dy = p.y - mouse.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < 100) {
          const force = (100 - dist) / 100;
          p.vx += (dx / dist) * force * 2;
          p.vy += (dy / dist) * force * 2;
        }

        p.x += p.vx;
        p.y += p.vy;
        p.vx *= 0.98;
        p.vy *= 0.98;

        if (p.x < 0 || p.x > W) p.vx *= -1;
        if (p.y < 0 || p.y > H) p.vy *= -1;

        ctx.fillStyle = `hsl(${p.hue}, 80%, 60%)`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      });
      break;
  }

  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
