<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reach Nash — What The Nash!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    /* === REACH PAGE === */
    .reach-hero {
      min-height: 60vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding-top: 6rem;
    }

    .reach-hero h1 { margin-bottom: 0.5rem; }
    .reach-hero .subtitle {
      color: var(--text-light);
      font-size: 1.15rem;
      max-width: 480px;
      margin: 0 auto;
      line-height: 1.8;
    }

    .reach-form-wrap {
      max-width: 560px;
      margin: -2rem auto 6rem;
      padding: 0 1.5rem;
    }

    .reach-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 3rem 2.5rem;
      box-shadow: 0 4px 40px rgba(58, 53, 48, 0.04);
      border: 1px solid rgba(138, 115, 85, 0.06);
    }

    .reach-card form {
      display: flex;
      flex-direction: column;
      gap: 1.4rem;
    }

    .form-group label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.45rem;
      letter-spacing: 0.02em;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 0.85rem 1.1rem;
      border: 1.5px solid var(--cream-dark);
      border-radius: var(--radius-sm);
      background: var(--cream-light);
      font-family: 'Figtree', sans-serif;
      font-size: 0.95rem;
      color: var(--text);
      transition: border-color 0.3s, box-shadow 0.3s;
      outline: none;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      border-color: var(--sage);
      box-shadow: 0 0 0 3px rgba(122, 184, 160, 0.12);
    }

    .form-group input::placeholder,
    .form-group textarea::placeholder {
      color: var(--text-muted);
    }

    .form-group textarea {
      min-height: 140px;
      resize: vertical;
      line-height: 1.7;
    }

    .send-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.9rem 2rem;
      background: var(--sage);
      color: var(--white);
      border: none;
      border-radius: 50px;
      font-family: 'Figtree', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      box-shadow: 0 2px 12px rgba(90, 154, 130, 0.25);
      letter-spacing: -0.01em;
      align-self: flex-start;
    }

    .send-btn:hover {
      background: var(--sage-dark);
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(90, 154, 130, 0.3);
    }

    .send-btn:active {
      transform: translateY(0);
    }

    .send-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* Status indicator */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.8rem;
      font-size: 0.82rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--sage);
      flex-shrink: 0;
    }

    /* Form feedback */
    .form-feedback {
      padding: 1rem 1.2rem;
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
      font-weight: 500;
      display: none;
    }

    .form-feedback.success {
      display: block;
      background: rgba(122, 184, 160, 0.1);
      color: var(--sage-dark);
      border: 1px solid rgba(122, 184, 160, 0.2);
    }

    .form-feedback.error {
      display: block;
      background: rgba(180, 80, 80, 0.08);
      color: #9a4a4a;
      border: 1px solid rgba(180, 80, 80, 0.15);
    }

    @media (max-width: 768px) {
      .reach-card {
        padding: 2.2rem 1.5rem;
      }
      .reach-form-wrap {
        padding: 0 1rem;
      }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">What The Nash!</a>
    <button class="nav-hamburger" onclick="this.classList.toggle('active');document.querySelector('.nav-links').classList.toggle('mobile-open');" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <div class="nav-links">
      <a href="index.html#hobbies">Hobbies</a>
      <a href="projects.html">Projects</a>
      <a href="index.html#about">About</a>
      <a href="reach.html" style="color: var(--sage-dark);">Reach Me</a>
    </div>
  </div>
</nav>

<!-- HERO -->
<section class="reach-hero">
  <div class="hero-content">
    <p class="section-label">Say Hello</p>
    <h1>Reach Nash</h1>
    <p class="subtitle">Got a question, idea, or just want to say hi? Drop a message and I'll get back to you.</p>
  </div>
</section>

<!-- FORM -->
<div class="reach-form-wrap">
  <div class="reach-card">
    <div class="status-bar">
      <span class="status-dot"></span>
      <span>Nash is around — messages are open</span>
    </div>

    <div id="formFeedback" class="form-feedback"></div>

    <form id="reachForm" action="https://YOUR_WORKER.workers.dev/messages" method="POST">
      <div class="form-group">
        <label for="name">Your Name</label>
        <input type="text" id="name" name="name" placeholder="What should I call you?" required maxlength="100">
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" placeholder="What's on your mind?" required maxlength="2000"></textarea>
      </div>
      <button type="submit" class="send-btn" id="sendBtn">
        Send It ✉️
      </button>
    </form>
  </div>
</div>

<!-- FOOTER -->
<footer class="footer">
  <div class="footer-links">
    <a href="index.html#hobbies">Hobbies</a>
    <a href="projects.html">Projects</a>
    <a href="index.html#about">About</a>
    <a href="reach.html">Reach Me</a>
  </div>
  <p class="footer-copy">© 2026 Nash. Built with curiosity.</p>
</footer>

<script>
// Progressive enhancement — form works without JS (server can handle POST),
// but with JS we use fetch for a smoother experience.
(function() {
  const form = document.getElementById('reachForm');
  const feedback = document.getElementById('formFeedback');
  const btn = document.getElementById('sendBtn');

  form.addEventListener('submit', async function(e) {
    e.preventDefault();

    const name = form.name.value.trim();
    const message = form.message.value.trim();

    if (!name || !message) return;

    btn.disabled = true;
    btn.textContent = 'Sending…';
    feedback.className = 'form-feedback';
    feedback.style.display = 'none';

    try {
      const res = await fetch(form.action, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, message })
      });

      const data = await res.json();

      if (res.ok && data.ok) {
        feedback.textContent = '✅ Message sent! Nash will see it soon.';
        feedback.className = 'form-feedback success';
        form.reset();
      } else {
        feedback.textContent = data.error || 'Something went wrong. Try again?';
        feedback.className = 'form-feedback error';
      }
    } catch (err) {
      feedback.textContent = 'Couldn\'t connect. Check your internet and try again.';
      feedback.className = 'form-feedback error';
    }

    btn.disabled = false;
    btn.textContent = 'Send It ✉️';
  });
})();
</script>
</body>
</html>
